<!DOCTYPE html><html>
<head>
  <title>Cid Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
    }

    .box {
      margin-top: 80px;
    }

    h1 {
      margin-bottom: 10px;
    }

    /* LOGO */
    img {
      width: 100px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(34,197,94,0.8);
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* BUTTON */
    button {
      padding: 14px 25px;
      background: linear-gradient(45deg, #22c55e, #16a34a);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(34,197,94,0.7);
    }

    /* PRODUK */
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(34,197,94,0.5);
    }

    /* TESTIMONI */
    .testi {
      margin-top: 60px;
      padding: 20px;
    }

    .testi p {
      opacity: 0.8;
    }

  </style></head><body><!-- HERO (TEKS AWAL TETAP ADA) --><div class="box">
  <img src="logo.png">
  <h1>Cid Store</h1>
  <p>Top Up & Digital Product Otomatis</p><button onclick="go()">Beli Sekarang</button>

</div><!-- PRODUK --><div class="products">  <div class="card">
    <h3>Voucher 10K</h3>
    <p>Rp10.000</p>
    <button onclick="buy('Voucher 10K',10000)">Beli</button>
  </div>  <div class="card">
    <h3>Voucher 20K</h3>
    <p>Rp20.000</p>
    <button onclick="buy('Voucher 20K',20000)">Beli</button>
  </div>  <div class="card">
    <h3>Top Up Game</h3>
    <p>Rp15.000</p>
    <button onclick="buy('Top Up',15000)">Beli</button>
  </div></div><!-- TESTIMONI --><div class="testi">
  <h2>⭐ Testimoni</h2>
  <p>🔥 "Cepat banget, langsung masuk!"</p>
  <p>🔥 "Trusted seller, recommended"</p>
</div><script>
function go(){
  window.location.href = "https://t.me/CidStore_Stars_bot";
}

function buy(name,price){
  window.location.href = "checkout.html?name="+name+"&price="+price;
}
</script></body>
</html>
